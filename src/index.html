<!doctype html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <!-- Title -->
    <title>PZip</title>

    <!-- SEO -->
    <meta
      name="title"
      content="PZip"
    />

    <meta
      name="description"
      content="Local & Fast Image Compression App Built with Bun.Image"
    />

    <meta
      name="keywords"
      content="PZip, image compression, image optimizer, JPG compressor, WEBP converter, PNG optimizer, Bun.Image"
    />

    <meta
      name="author"
      content="PZip"
    />

    <meta
      name="robots"
      content="index, follow, max-image-preview:large"
    />

    <!-- Theme -->
    <meta
      name="theme-color"
      content="#050505"
    />

    <!-- Canonical -->
    <link
      rel="canonical"
      href="https://pzip.onrender.com/"
    />

    <!-- Open Graph -->
    <meta
      property="og:type"
      content="website"
    />

    <meta
      property="og:site_name"
      content="PZip"
    />

    <meta
      property="og:title"
      content="PZip"
    />

    <meta
      property="og:description"
      content="Local & Fast Image Compression App Built with Bun.Image"
    />

    <meta
      property="og:url"
      content="https://pzip.onrender.com/"
    />

    <meta
      property="og:image"
      content="https://pzip.onrender.com/Social.png"
    />

    <meta
      property="og:image:width"
      content="1200"
    />

    <meta
      property="og:image:height"
      content="630"
    />

    <meta
      property="og:image:type"
      content="image/png"
    />

    <meta
      property="og:locale"
      content="en_US"
    />

    <!-- Twitter -->
    <meta
      name="twitter:card"
      content="summary_large_image"
    />

    <meta
      name="twitter:title"
      content="PZip"
    />

    <meta
      name="twitter:description"
      content="Local & Fast Image Compression App Built with Bun.Image"
    />

    <meta
      name="twitter:image"
      content="https://pzip.onrender.com/Social.png"
    />

    <!-- Favicon -->
    <link
      rel="icon"
      type="image/png"
      href="../public/Favicon.png"
    />

    <link
      rel="apple-touch-icon"
      href="../public/Favicon.png"
    />

    <!-- Fonts -->
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />

    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&family=Geist:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "PZip",
        "applicationCategory": "WebApplication",
        "operatingSystem": "Any",
        "url": "https://pzip.onrender.com/",
        "image": "https://pzip.onrender.com/Social.png",
        "description": "Local & Fast Image Compression App Built with Bun.Image",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        }
      }
    </script>

    <!-- App -->
    <script
      type="module"
      src="./frontend.tsx"
    ></script>
  </head>

  <body>
    <div id="root"></div>
  </body>
</html>
